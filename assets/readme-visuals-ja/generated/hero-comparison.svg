<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94a3b8" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="720" height="200" rx="12" fill="#ffffff"/>
  <rect width="720" height="200" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Left: Without -->
  <g filter="url(#sh)" transform="translate(24, 20)">
    <rect x="0" y="0" width="324" height="160" rx="10" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <text x="162" y="28" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="13" font-weight="700" fill="#64748b" letter-spacing="0.5">ハーネスなし</text>

    <g transform="translate(24, 48)" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" fill="#94a3b8">
      <g transform="translate(0, 0)">
        <circle cx="6" cy="-3" r="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="6" y="0" text-anchor="middle" font-size="8" fill="#cbd5e1">-</text>
        <text x="20" y="0">いきなりコードを書き始める</text>
      </g>
      <g transform="translate(0, 24)">
        <circle cx="6" cy="-3" r="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="6" y="0" text-anchor="middle" font-size="8" fill="#cbd5e1">-</text>
        <text x="20" y="0">頼まれた時だけレビュー</text>
      </g>
      <g transform="translate(0, 48)">
        <circle cx="6" cy="-3" r="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.8"/>
        <text x="6" y="0" text-anchor="middle" font-size="8" fill="#cbd5e1">-</text>
        <text x="20" y="0">過去の判断を忘れる</text>
      </g>
      <g transform="translate(0, 72)">
        <circle cx="6" cy="-3" r="6" fill="#fef2f2" stroke="#fecaca" stroke-width="0.8"/>
        <text x="6" y="0" text-anchor="middle" font-size="8" fill="#fca5a5">!</text>
        <text x="20" y="0" fill="#f87171">rm -rf が警告なしで実行される</text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="360" y1="32" x2="360" y2="168" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Right: With Harness -->
  <g filter="url(#sh)" transform="translate(372, 20)">
    <rect x="0" y="0" width="324" height="160" rx="10" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
    <text x="162" y="28" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="13" font-weight="700" fill="#F7931A" letter-spacing="0.5">ハーネスあり</text>

    <g transform="translate(24, 48)" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="11" fill="#1e293b">
      <g transform="translate(0, 0)">
        <circle cx="6" cy="-3" r="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
        <path d="M3 -3 L5 -1 L9 -5" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" font-weight="500">まず計画、それから実行</text>
      </g>
      <g transform="translate(0, 24)">
        <circle cx="6" cy="-3" r="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
        <path d="M3 -3 L5 -1 L9 -5" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" font-weight="500">全変更を自動レビュー</text>
      </g>
      <g transform="translate(0, 48)">
        <circle cx="6" cy="-3" r="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
        <path d="M3 -3 L5 -1 L9 -5" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" font-weight="500">SSOTでコンテキスト保持</text>
      </g>
      <g transform="translate(0, 72)">
        <circle cx="6" cy="-3" r="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.8"/>
        <path d="M3 -3 L5 -1 L9 -5" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" font-weight="500">危険なコマンドをブロック</text>
      </g>
    </g>
  </g>
</svg>