<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" fill="none">
  <defs>
    <linearGradient id="pipeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/><stop offset="0.5" stop-color="#3b82f6"/><stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shW"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.12"/></filter>
    <filter id="glW"><feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="160" rx="12" fill="#ffffff"/>
  <rect width="700" height="160" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Pipeline line -->
  <line x1="120" y1="80" x2="580" y2="80" stroke="url(#pipeG)" stroke-width="2" opacity="0.1"/>

  <!-- Input -->
  <g filter="url(#shW)" transform="translate(16, 50)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="50" y="30" text-anchor="middle" font-family="'SF Mono', monospace" font-size="14" font-weight="800" fill="#4f46e5">/work</text>
    <text x="50" y="46" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" font-weight="700" fill="#6366f1">all</text>
  </g>

  <!-- Arrow 1 -->
  <g filter="url(#glW)">
    <path d="M120 80 L148 80" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <polygon points="146,76 154,80 146,84" fill="#6366f1" opacity="0.6"/>
  </g>

  <!-- Step 1 -->
  <g filter="url(#shW)" transform="translate(156, 56)">
    <rect x="0" y="0" width="92" height="48" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="20" cy="24" r="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="0.5"/>
    <text x="20" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#4f46e5">1</text>
    <text x="58" y="20" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="10" font-weight="600" fill="#1e293b">計画</text>
    <text x="58" y="34" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="7.5" fill="#94a3b8">自動生成</text>
  </g>

  <!-- Arrow 2 -->
  <g filter="url(#glW)">
    <path d="M252 80 L278 80" stroke="#4f7ff7" stroke-width="1.5" opacity="0.5"/>
    <polygon points="276,76 284,80 276,84" fill="#4f7ff7" opacity="0.6"/>
  </g>

  <!-- Step 2 -->
  <g filter="url(#shW)" transform="translate(286, 56)">
    <rect x="0" y="0" width="92" height="48" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="20" cy="24" r="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
    <text x="20" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">2</text>
    <text x="58" y="20" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="10" font-weight="600" fill="#1e293b">実装</text>
    <text x="58" y="34" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="7.5" fill="#94a3b8">並列 x5</text>
    <g transform="translate(72, 38)" opacity="0.35">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#2563eb" stroke-width="1"/>
      <line x1="4" y1="0" x2="4" y2="5" stroke="#2563eb" stroke-width="1"/>
      <line x1="8" y1="0" x2="8" y2="5" stroke="#2563eb" stroke-width="1"/>
    </g>
  </g>

  <!-- Arrow 3 -->
  <g filter="url(#glW)">
    <path d="M382 80 L408 80" stroke="#0d9488" stroke-width="1.5" opacity="0.5"/>
    <polygon points="406,76 414,80 406,84" fill="#0d9488" opacity="0.6"/>
  </g>

  <!-- Step 3 -->
  <g filter="url(#shW)" transform="translate(416, 56)">
    <rect x="0" y="0" width="92" height="48" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="20" cy="24" r="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="0.5"/>
    <text x="20" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0d9488">3</text>
    <text x="58" y="20" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="10" font-weight="600" fill="#1e293b">レビュー</text>
    <text x="58" y="34" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="7.5" fill="#94a3b8">品質ゲート</text>
  </g>

  <!-- Arrow 4 -->
  <g filter="url(#glW)">
    <path d="M512 80 L538 80" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
    <polygon points="536,76 544,80 536,84" fill="#0891b2" opacity="0.6"/>
  </g>

  <!-- Step 4 -->
  <g filter="url(#shW)" transform="translate(546, 56)">
    <rect x="0" y="0" width="92" height="48" rx="8" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="20" cy="24" r="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="0.5"/>
    <text x="20" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0891b2">4</text>
    <text x="58" y="20" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="10" font-weight="600" fill="#1e293b">コミット</text>
    <text x="58" y="34" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="7.5" fill="#94a3b8">自動</text>
  </g>

  <!-- Result -->
  <g filter="url(#glW)" transform="translate(650, 68)">
    <circle cx="0" cy="0" r="14" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <path d="M-6 0 L-2 4 L6 -4" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom label -->
  <text x="350" y="140" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="10" fill="#94a3b8">1コマンドで4ステップを自動実行。計画 → 並列実装 → レビュー → コミット。</text>
</svg>
