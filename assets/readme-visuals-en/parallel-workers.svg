    <circle cx="22" cy="22" r="12" fill="#ecfeff" stroke="#a5f3fc" stroke-width="0.8"/>
    <circle cx="22" cy="18" r="4" fill="none" stroke="#0891b2" stroke-width="1"/>
    <path d="M14 28 Q14 24 22 22 Q30 24 30 28" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.5"/>
