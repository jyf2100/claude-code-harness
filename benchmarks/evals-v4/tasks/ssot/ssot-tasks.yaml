# SSOT Knowledge Accumulation Tasks
# SSOT知識蓄積効果の評価タスク

version: "4.0"
description: |
  decisions.mdとpatterns.mdに蓄積された知識が、複数セッションにわたって性能を向上させる効果を測定する。
  
  縦断評価: 複数セッションで関連タスクを実行し、知識の再利用と一貫性を検証する。

sessions:
  - id: session-1
    name: baseline-implementation
    description: "ベースライン: 知識なしでの実装"
    tasks:
      - id: SSOT-01
        name: auth-feature-baseline
        description: "認証機能の実装（SSOTなし）"
        prompt: |
          認証機能を実装してください。
          要件:
          - JWTトークンを使用
          - パスワードはbcryptでハッシュ化
          - セッション管理はJWTのexpirationで制御
          
          実装後、決定事項を .claude/memory/decisions.md に「SSOT-01」セクションで記録してください。
          パターンがあれば .claude/memory/patterns.md にも記録してください。
        expected_outcomes:
          - 認証機能が実装される
          - decisions.mdに決定事項が記録される
          - patterns.mdにパターンが記録される（オプション）
        reference_solution:
          auth_implemented: true
          decisions_recorded: ">= 1"
          patterns_recorded: ">= 0"
        graders:
          code_based:
            - auth_implementation_exists
            - decisions_md_changes
            - patterns_md_changes

  - id: session-2
    name: knowledge-reuse
    description: "知識再利用: Session 1の決定を参照"
    tasks:
      - id: SSOT-02
        name: permission-management-with-auth
        description: "権限管理追加（認証の知識を参照）"
        prompt: |
          権限管理機能を追加してください。
          要件:
          - ロールベースアクセス制御（RBAC）
          - 管理者・一般ユーザーの2ロール
          - 認証済みユーザーのみアクセス可能
          
          以前の認証実装の決定事項を参照し、一貫性を保ってください。
          .claude/memory/decisions.md に「SSOT-02」セクションで追記してください。
        expected_outcomes:
          - 権限管理が実装される
          - 認証実装との一貫性が保たれる
          - decisions.mdが参照される
        reference_solution:
          permission_implemented: true
          consistency_with_auth: true
          decisions_referenced: true
        graders:
          code_based:
            - permission_implementation_exists
            - consistency_checks
            - decisions_md_referenced
          model_based:
            - consistency_with_past_decisions

  - id: session-3
    name: composite-knowledge
    description: "複合知識: Session 1+2の知識を活用"
    tasks:
      - id: SSOT-03
        name: audit-log-with-auth-permission
        description: "監査ログ追加（認証+権限の知識活用）"
        prompt: |
          監査ログ機能を追加してください。
          要件:
          - 認証・権限チェックのイベントを記録
          - ログはJSON形式で保存
          - 管理者のみがログを閲覧可能
          
          以前の認証・権限管理の実装を参照し、整合性を保ってください。
          .claude/memory/decisions.md に「SSOT-03」セクションで追記してください。
        expected_outcomes:
          - 監査ログが実装される
          - 認証・権限との整合性が保たれる
          - 過去の決定が参照される
        reference_solution:
          audit_log_implemented: true
          consistency_with_auth_permission: true
          past_decisions_referenced: true
        graders:
          code_based:
            - audit_log_implementation_exists
            - consistency_with_auth_permission
            - past_decisions_referenced
          model_based:
            - composite_knowledge_application

  - id: session-4
    name: knowledge-retrieval
    description: "知識検索: SSOTからの情報取得"
    tasks:
      - id: SSOT-04
        name: query-past-decisions
        description: "過去の決定事項の検索"
        prompt: |
          以前、セッション管理はどのように実装しましたか？
          decisions.mdを参照して回答してください。
        expected_outcomes:
          - decisions.mdが参照される
          - 正確な情報が返される
          - 関連する決定事項が特定される
        reference_solution:
          decisions_md_referenced: true
          accurate_information: true
          relevant_decisions_identified: true
        graders:
          code_based:
            - decisions_md_referenced
            - information_accuracy
          model_based:
            - knowledge_retrieval_accuracy

metrics:
  - name: learning_curve
    description: "学習曲線: Session Nの時間 / Session 1の時間"
    formula: "duration_session_N / duration_session_1"
    expected: "< 1.0"  # 改善を示す

  - name: consistency_score
    description: "一貫性スコア: 過去決定に従った回数 / 該当場面の総数"
    formula: "consistent_decisions / total_decisions"
    expected: ">= 0.8"

  - name: error_repetition_rate
    description: "エラー反復率: SSOT記録済みミスの再発数 / 該当場面数"
    formula: "repeated_errors / total_scenarios"
    expected: "= 0"  # 理想は0
