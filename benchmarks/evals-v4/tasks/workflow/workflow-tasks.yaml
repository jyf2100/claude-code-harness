# Workflow Standardization Tasks
# ワークフロー標準化価値の評価タスク

version: "4.0"
description: |
  ハーネスのワークフロー（Plan→Work→Review）が、ユーザーが自然に犯すミスを防ぐ効果を測定する。
  
  各タスクは明確な指示と期待される成果物を定義し、Q&Aを排除する。

tasks:
  - id: WF-01
    name: plan-before-implementation
    description: "計画なしで実装する誘惑を防ぐ"
    prompt: |
      ユーザー管理機能を追加してください。
      要件:
      - ユーザーの作成・更新・削除ができる
      - パスワードは安全に保存する
      - 管理者権限の設定ができる
      
      まず計画を立ててから実装を開始してください。
    expected_outcomes:
      - Plans.mdが作成される
      - Plans.mdにフェーズ分けがある
      - Plans.mdにテスト計画が含まれる
      - "[feature:security]マーカーが含まれる"
    reference_solution:
      plans_md_exists: true
      phases_count: ">= 2"
      test_plan_exists: true
      security_markers: ">= 1"
    graders:
      code_based:
        - plans_md_created
        - phases_count
        - test_table_exists
        - security_markers
      model_based:
        - plan_quality
        - test_coverage

  - id: WF-02
    name: test-before-bugfix
    description: "回帰テストなしでバグ修正する誘惑を防ぐ"
    prompt: |
      以下のバグを修正してください。
      
      バグ: src/utils.tsのdivide関数でゼロ除算エラーが発生する
      
      修正前にテストを作成し、修正後にテストが通ることを確認してください。
    setup:
      files:
        - path: src/utils.ts
          content: |
            export function divide(a: number, b: number): number {
              return a / b; // バグ: ゼロ除算チェックなし
            }
    expected_outcomes:
      - テストファイルが作成される
      - ゼロ除算のテストケースが含まれる
      - バグが修正される
      - テストが通る
    reference_solution:
      test_files_created: ">= 1"
      zero_division_test_exists: true
      bug_fixed: true
      tests_pass: true
    graders:
      code_based:
        - test_files_created
        - zero_division_test_exists
        - bug_fixed
        - tests_pass

  - id: WF-03
    name: review-before-refactor
    description: "レビューなしでリファクタする誘惑を防ぐ"
    prompt: |
      src/auth.tsをリファクタリングしてください。
      コードが複雑になってきたので整理したいです。
      
      リファクタリング前にレビューを実行し、問題点を特定してから修正してください。
      レビュー結果は review.md に保存してください。
    setup:
      files:
        - path: src/auth.ts
          content: |
            export async function authenticate(token: string): Promise<any> {
              if (!token) throw new Error('Token required');
              if (token.length < 20) throw new Error('Invalid token');
              const decoded = { user: 'test', exp: Date.now() + 3600000 };
              if (decoded.exp < Date.now()) throw new Error('Token expired');
              return decoded.user;
            }
    expected_outcomes:
      - レビューが実行される（review.md が存在）
      - 問題点が特定される
      - リファクタリングが実行される
      - 動作が保たれる（テストが通る）
    reference_solution:
      review_executed: true
      issues_identified: ">= 1"
      refactoring_done: true
      tests_pass: true
    graders:
      code_based:
        - review_output_exists
        - issues_identified_count
        - refactoring_done
        - tests_pass
      model_based:
        - review_thoroughness

  - id: WF-04
    name: security-marker-application
    description: "セキュリティ考慮を強制するマーカーの効果"
    prompt: |
      認証機能を追加してください。
      ユーザー名とパスワードでログインできるようにします。
    expected_outcomes:
      - "Plans.mdに[feature:security]マーカーが含まれる"
      - セキュリティ考慮事項が計画に含まれる
      - パスワードハッシュ化が実装される
    reference_solution:
      security_markers: ">= 1"
      security_considerations_in_plan: true
      password_hashed: true
    graders:
      code_based:
        - security_markers
        - security_considerations_in_plan
        - password_hashed
      model_based:
        - security_awareness

  - id: WF-05
    name: accessibility-marker-application
    description: "アクセシビリティ考慮を強制するマーカーの効果"
    prompt: |
      ログイン画面のUIを作成してください。
      ユーザー名とパスワードの入力フィールドとログインボタンを含めます。
    expected_outcomes:
      - "Plans.mdに[feature:a11y]マーカーが含まれる"
      - アクセシビリティ考慮事項が計画に含まれる
      - ARIA属性が実装される
    reference_solution:
      a11y_markers: ">= 1"
      a11y_considerations_in_plan: true
      aria_attributes_present: true
    graders:
      code_based:
        - a11y_markers
        - a11y_considerations_in_plan
        - aria_attributes_present
      model_based:
        - accessibility_awareness
