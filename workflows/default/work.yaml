# /work 工作流定义
# 执行 Plans.md 中的计划，生成实际代码

phase: work
description: "执行计划任务，生成可运行代码的阶段"

steps:
  # Step 1: 确认当前任务状态
  - id: read-context
    skill: core-read-repo-context
    input:
      files:
        - Plans.md
        - AGENTS.md
      context_from:
        - repo_tree
        - git_status
    mode: required

  # Step 1.5: /work 命令标志解析
  - id: parse-work-flags
    skill: parse-work-flags
    input:
      context_from:
        - user_prompt
    output:
      variables:
        - full_mode
        - parallel_count
        - isolation_mode
        - commit_strategy
        - deploy_after_commit
        - max_iterations
        - skip_cross_review
        - resume_session_id
        - resume_latest
        - fork_session_id
        - fork_reason
    mode: required

  # Step 1.6: 会话恢复/分支控制（仅指定时）
  - id: session-control
    skill: session-control
    condition: "resume_latest == true || resume_session_id != '' || fork_session_id != '' || fork_reason != ''"
    input:
      variables:
        - resume_session_id
        - resume_latest
        - fork_session_id
        - fork_reason
    mode: required

  # Step 2: 确定待执行任务
  - id: identify-tasks
    skill: plans-management
    input:
      files:
        - Plans.md
      context_from:
        - user_prompt
    output:
      variables:
        - target_tasks
        - current_phase
    mode: required

  # Step 2.5: 任务开始时更新标记（吸收 /start-task 功能）
  # pm:请求中 / cursor:请求中 / cc:TODO → cc:WIP 自动转换
  - id: update-marker-to-wip
    skill: plans-management
    input:
      files:
        - Plans.md
      action: update_marker
      from: "pm:依頼中|cursor:依頼中|cc:TODO"
      to: "cc:WIP"
      target: target_tasks
    output:
      update_files:
        - Plans.md
    mode: required

  # Step 3: 执行任务（--full 模式分支）
  # --full 模式: 执行 Phase1~4
  # 普通模式: 执行现有 execute-task 流程

  # === Phase 1: 构建依赖图并并行启动 task-worker（仅 --full 时） ===
  # Step 3.1: 构建依赖图
  - id: build-dependency-graph
    skill: build-dependency-graph
    condition: "full_mode == true"
    input:
      files:
        - Plans.md
      variables:
        - target_tasks
    output:
      variables:
        - parallel_groups
        - task_files
    mode: required

  # Step 3.2: 准备 worktree（仅 isolation=worktree 时）
  - id: setup-worktrees
    skill: setup-worktrees
    condition: "full_mode == true && isolation_mode == 'worktree'"
    input:
      variables:
        - parallel_groups
        - task_files
      context_from:
        - git_status
    output:
      variables:
        - worktree_paths
        - worktree_branches
    mode: required

  # Step 3.3: 并行启动 task-worker
  - id: run-task-workers
    skill: run-task-workers
    condition: "full_mode == true"
    input:
      variables:
        - parallel_groups
        - task_files
        - parallel_count
        - max_iterations
        - isolation_mode
        - commit_strategy
        - worktree_paths
        - worktree_branches
    output:
      variables:
        - worker_results
        - all_ready
        - escalation_count
        - changed_files
    mode: required

  # Step 3.4: 合并 worktree（仅 isolation=worktree 时）
  - id: merge-worktrees
    skill: merge-worktrees
    condition: "full_mode == true && isolation_mode == 'worktree'"
    input:
      variables:
        - worktree_branches
        - worker_results
        - commit_strategy
      context_from:
        - git_status
    output:
      variables:
        - merged
        - conflict_files
    mode: required

  # Step 3.5: 确定审查模式（用于 Phase2）
  - id: determine-review-mode
    skill: determine-review-mode
    condition: "full_mode == true && skip_cross_review == false"
    input:
      context_from:
        - config_file
    output:
      variables:
        - review_mode
    mode: required

  # === Phase 2: 交叉审查（仅 --full 且 skip_cross_review=false 时） ===
  - id: cross-review
    skill: harness-review
    condition: "full_mode == true && skip_cross_review == false"
    input:
      files: "{{changed_files}}"
      context_from:
        - code_content
      variables:
        - review_mode
    output:
      variables:
        - review_result
        - review_grade
        - review_issues
    mode: required

  # === Phase 3: 执行提交（仅 --full 时） ===
  # Step 3.6: 执行提交
  - id: execute-commit
    skill: execute-commit
    condition: "full_mode == true && commit_strategy != 'task'"
    input:
      variables:
        - commit_strategy
        - worker_results
        - review_result
        - changed_files
    output:
      variables:
        - committed
        - commit_hash
        - commit_message
    mode: required

  # === Phase 4: 部署（仅 --full 且 deploy_after_commit=true 时） ===
  - id: deploy
    skill: deploy
    condition: "full_mode == true && deploy_after_commit == true"
    input:
      variables:
        - commit_hash
      context_from:
        - config_file
    output:
      variables:
        - deploy_url
        - deploy_status
    mode: required

  # === 普通模式（未指定 --full 时）: 现有流程 ===
  # Step 3: 执行任务（循环）
  - id: execute-task
    skill: work-impl-feature
    condition: "full_mode == false"
    input:
      variables:
        - target_tasks
      context_from:
        - tech_stack
        - existing_code
    output:
      update_files:
        - Plans.md
      created_files: true
    mode: required
    loop: target_tasks

  # Step 4: 验证运行
  - id: verify-build
    skill: verify-build
    condition: "full_mode == false"
    input:
      commands:
        - npm run build
        - npm run dev
    mode: optional

  # Step 5: 自我审查（可选）
  - id: self-review
    skill: review-changes
    condition: "full_mode == false"
    input:
      context_from:
        - git_diff
    mode: optional

# 成功时的输出
on_success:
  message: |
    ✅ 阶段完成！

    **已完成的任务:**
    {{completed_tasks}}

    **生成的文件:**
    {{created_files}}

    接下来可以：
    - 「运行」→ 验证运行
    - 「审查」→ 代码质量检查
    - 「进入下一阶段」→ 继续执行

# 错误时的输出
on_error:
  skill: error-recovery
  max_retries: 3
  message: |
    ⚠️ 执行过程中发生错误。

    正在尝试自动修复...
