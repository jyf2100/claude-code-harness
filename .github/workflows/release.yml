name: auto-release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Release $TAG already exists (created by release-har). Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Release $TAG not found. Creating safety-net release."
          fi

      - name: Extract CHANGELOG entry
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release $TAG (auto-generated — no CHANGELOG entry found for this version)"
          fi

          # Write to file to preserve newlines
          echo "$BODY" > /tmp/release-body.md

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-body.md \
            --verify-tag

          echo "✅ Safety-net release created for $TAG"
